Ye code `index.html` me डाल दो. 1 second animation ke baad redirect karega:

```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Redirecting...</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  user-select:none;
}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#eaf4ff,#ffffff);
  font-family:Arial,sans-serif;
  overflow:hidden;
}
.loader-box{
  text-align:center;
}
.logo{
  font-size:60px;
  animation:bounce .8s infinite;
}
h2{
  margin-top:15px;
  color:#2563eb;
  font-size:24px;
}
p{
  margin-top:8px;
  color:#6b7280;
}
.dots span{
  font-size:30px;
  animation:blink 1s infinite;
}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}

@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
@keyframes blink{
  0%,100%{opacity:.2}
  50%{opacity:1}
}
</style>
</head>

<body oncontextmenu="return false">

<div class="loader-box">
  <div class="logo">🏏</div>
  <h2>Opening Cricket Sathi</h2>
  <p>Please wait</p>
  <div class="dots">
    <span>.</span><span>.</span><span>.</span>
  </div>
</div>

<script>
setTimeout(function(){
  window.location.href = "https://cricketsathi.42web.io/";
}, 1000);
</script>

</body>
</html>
```
